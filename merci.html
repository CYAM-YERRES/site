<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merci — CYAM Yerres</title>
<meta name="robots" content="noindex">
<style>
  :root{--paper:#141210;--card:#1E1B18;--ink:#F4EEE4;--ink-soft:#A79E92;--line:#332D27;--line-strong:#4A4239;
    --seal:#E4231F;--seal-ink:#B01319;--ok:#57C77E;--r:12px;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit}
  header.nav{background:rgba(20,18,14,.95);border-bottom:1px solid rgba(255,255,255,.10)}
  .nav-in{max-width:1080px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:11px}
  .logo{display:flex;align-items:center;gap:11px;text-decoration:none;font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:.04em;color:var(--ink)}
  .logo img{width:42px;height:42px;border-radius:50%}
  .logo small{display:block;font-size:9.5px;letter-spacing:.18em;color:rgba(245,241,232,.6);text-transform:uppercase;font-weight:600}
  main{flex:1;display:grid;place-items:center;padding:40px 22px}
  .box{max-width:560px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:44px 36px}
  .check{width:72px;height:72px;border-radius:50%;background:rgba(87,199,126,.12);border:2px solid var(--ok);display:grid;place-items:center;margin:0 auto 22px}
  .check svg{stroke:var(--ok)}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(26px,4vw,34px);margin:0 0 12px}
  p{color:var(--ink-soft);font-size:16px;margin:0 0 14px}
  .btn{display:inline-block;margin-top:12px;text-decoration:none;font-weight:600;border-radius:9px;padding:12px 22px;font-size:15px;background:var(--seal);color:#fff}
  .btn:hover{background:var(--seal-ink)}
</style>
</head>
<body>
<header class="nav">
  <div class="nav-in">
    <a class="logo" href="index.html">
      <img src="logo-cyam.png" alt="Logo du CYAM Yerres">
      <span>CYAM<small>Yerres · Arts martiaux</small></span>
    </a>
  </div>
</header>
<main>
  <div class="box">
    <div class="check">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>Merci pour votre adhésion&nbsp;!</h1>
    <p>Votre paiement a bien été pris en compte. Un <strong>e-mail de confirmation et votre reçu</strong> vous seront envoyés par HelloAsso.</p>
    <p>Bienvenue (ou bon retour) au Club Yerrois d'Arts Martiaux. À très bientôt sur le tatami&nbsp;! 🥋</p>
    <a class="btn" href="index.html">Retour à l'accueil</a>
  </div>
</main>
</body>
</html>
